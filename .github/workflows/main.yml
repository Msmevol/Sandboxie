name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, experimental]
    paths-ignore:
      - '**/*.md'
      - '**/*.html'
      - '**/*.png'
      - '**/*.bmp'
      - '**/LICENSE*'
      - '**/license*'
      - '**/README*'
      - '**/ReadMe*'
      - '**/INSTALL*'
      - '**/AUTHORS'
      - '**/COPYING'
  pull_request:
    branches: [master, experimental]
    paths-ignore:
      - '**/*.md'
      - '**/*.html'
      - '**/*.png'
      - '**/*.bmp'
      - '**/LICENSE*'
      - '**/license*'
      - '**/README*'
      - '**/ReadMe*'
      - '**/INSTALL*'
      - '**/AUTHORS'
      - '**/COPYING'

jobs:
  Build_x64:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Sandboxie x86 (DLLs & svc)
        run: msbuild /t:build Sandboxie\SandboxDll.sln /p:Configuration="SbieRelease" /p:Platform=Win32 -maxcpucount:8

      - name: Build Sandboxie x64 (all)
        run: msbuild /t:build Sandboxie\Sandbox.sln /p:Configuration="SbieRelease" /p:Platform=x64 -maxcpucount:8
        
      - name: Build Sandboxie x64 (drv)
        run: msbuild /t:build Sandboxie\SandboxDrv.sln /p:Configuration="SbieRelease" /p:Platform=x64 -maxcpucount:8

      - name: Prepare output directory
        run: |
          mkdir BuildOutput
          mkdir BuildOutput\x86
          mkdir BuildOutput\x64

      - name: Copy x86 binaries
        run: |
          Copy-Item Sandboxie\Bin\Win32\SbieRelease\*.dll BuildOutput\x86\
          Copy-Item Sandboxie\Bin\Win32\SbieRelease\*.exe BuildOutput\x86\
          if (Test-Path "Sandboxie\core\low\obj\i386\LowLevel.dll") {
            Copy-Item "Sandboxie\core\low\obj\i386\LowLevel.dll" BuildOutput\x86\
          }

      - name: Copy x64 binaries
        run: |
          Copy-Item Sandboxie\Bin\x64\SbieRelease\*.dll BuildOutput\x64\
          Copy-Item Sandboxie\Bin\x64\SbieRelease\*.exe BuildOutput\x64\
          Copy-Item Sandboxie\Bin\x64\SbieRelease\*.sys BuildOutput\x64\
          if (Test-Path "Sandboxie\core\low\obj\amd64\LowLevel.dll") {
            Copy-Item "Sandboxie\core\low\obj\amd64\LowLevel.dll" BuildOutput\x64\
          }

      - name: Copy tools
        run: |
          if (Test-Path "SandboxieTools\Release\*.exe") {
            Copy-Item SandboxieTools\Release\*.exe BuildOutput\x64\
          }

      - name: Install NSIS via Chocolatey
        run: |
          choco install nsis.portable --version=2.50 -y
          
      - name: Install InetC Plugin
        run: |
          Invoke-WebRequest -Uri "https://nsis.sourceforge.io/mediawiki/images/c/c9/Inetc.zip" -OutFile inetc.zip
          Expand-Archive -Path inetc.zip -DestinationPath inetc
          Copy-Item "inetc\Plugins\x86-ansi\InetC.dll" "C:\ProgramData\chocolatey\lib\nsis.portable\tools\nsis-2.50\Plugins\" -Force

      - name: Update NSIS files
        run: |
          Expand-Archive -Path "Sandboxie\install\nsis_updates.zip" -DestinationPath nsis_updates -Force
          robocopy "nsis_updates\nsis\Contrib" "C:\ProgramData\chocolatey\lib\nsis.portable\tools\nsis-2.50\Contrib" /E /IS
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE } else { exit 0 }

      - name: Setup Iconv
        run: |
          mkdir tools\iconv -Force
          # 使用预编译的 iconv 二进制文件
          Invoke-WebRequest -Uri "https://github.com/mlocati/gettext-iconv-windows/releases/download/v0.21-v1.16/gettext0.21-iconv1.16-shared-64.zip" -OutFile iconv.zip
          Expand-Archive -Path iconv.zip -DestinationPath iconv-temp
          Copy-Item "iconv-temp\bin\iconv.exe" "tools\iconv\" -Force -ErrorAction SilentlyContinue
          Copy-Item "iconv-temp\bin\*.dll" "tools\iconv\" -Force -ErrorAction SilentlyContinue

      - name: Build NSIS Installer (x64)
        run: |
          $env:SBIE_BUILDARCH = "x64"
          & "C:\ProgramData\chocolatey\lib\nsis.portable\tools\nsis-2.50\makensis.exe" /DSBIE_BUILDARCH=x64 /DVERSION=5.72.3 Sandboxie\install\SandboxieVS.nsi

      # - name: Build NSIS Installer (Win32)
      #   run: |
      #     $env:SBIE_BUILDARCH = "Win32"
      #     & "C:\ProgramData\chocolatey\lib\nsis.portable\tools\nsis-2.50\makensis.exe" /DSBIE_BUILDARCH=Win32 /DVERSION=5.72.3 Sandboxie\install\SandboxieVS.nsi

      - name: Upload Sandboxie Build
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Sandboxie-Build-x64
          path: |
            BuildOutput/**
          retention-days: 30

      - name: Upload NSIS Installers
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Xdefend-Installer
          path: |
            Sandboxie\Bin\x64\*Install*.exe
          retention-days: 30
