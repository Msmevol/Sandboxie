name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, experimental]
    paths-ignore:
      - '**/*.md'
      - '**/*.html'
      - '**/*.png'
      - '**/*.bmp'
      - '**/LICENSE*'
      - '**/license*'
      - '**/README*'
      - '**/ReadMe*'
      - '**/INSTALL*'
      - '**/AUTHORS'
      - '**/COPYING'
  pull_request:
    branches: [master, experimental]
    paths-ignore:
      - '**/*.md'
      - '**/*.html'
      - '**/*.png'
      - '**/*.bmp'
      - '**/LICENSE*'
      - '**/license*'
      - '**/README*'
      - '**/ReadMe*'
      - '**/INSTALL*'
      - '**/AUTHORS'
      - '**/COPYING'

jobs:
  Build_x64:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Sandboxie x86 (DLLs & svc)
        run: msbuild /t:build Sandboxie\SandboxDll.sln /p:Configuration="SbieRelease" /p:Platform=Win32 -maxcpucount:8

      - name: Build Sandboxie x64 (all)
        run: msbuild /t:build Sandboxie\Sandbox.sln /p:Configuration="SbieRelease" /p:Platform=x64 -maxcpucount:8
        
      - name: Build Sandboxie x64 (drv)
        run: msbuild /t:build Sandboxie\SandboxDrv.sln /p:Configuration="SbieRelease" /p:Platform=x64 -maxcpucount:8

      - name: Prepare output directory
        run: |
          mkdir BuildOutput
          mkdir BuildOutput\x86
          mkdir BuildOutput\x64

      - name: Copy x86 binaries
        run: |
          Copy-Item Sandboxie\Bin\Win32\SbieRelease\*.dll BuildOutput\x86\
          Copy-Item Sandboxie\Bin\Win32\SbieRelease\*.exe BuildOutput\x86\
          if (Test-Path "Sandboxie\core\low\obj\i386\LowLevel.dll") {
            Copy-Item "Sandboxie\core\low\obj\i386\LowLevel.dll" BuildOutput\x86\
          }

      - name: Copy x64 binaries
        run: |
          Copy-Item Sandboxie\Bin\x64\SbieRelease\*.dll BuildOutput\x64\
          Copy-Item Sandboxie\Bin\x64\SbieRelease\*.exe BuildOutput\x64\
          Copy-Item Sandboxie\Bin\x64\SbieRelease\*.sys BuildOutput\x64\
          if (Test-Path "Sandboxie\core\low\obj\amd64\LowLevel.dll") {
            Copy-Item "Sandboxie\core\low\obj\amd64\LowLevel.dll" BuildOutput\x64\
          }

      - name: Copy tools
        run: |
          if (Test-Path "SandboxieTools\Release\*.exe") {
            Copy-Item SandboxieTools\Release\*.exe BuildOutput\x64\
          }

      - name: Install NSIS 2.5
        run: |
          Invoke-WebRequest -Uri "https://sourceforge.net/projects/nsis/files/NSIS%202/2.50/nsis-2.50-setup.exe/download" -OutFile nsis-setup.exe -UserAgent "Mozilla/5.0"
          Start-Process -FilePath "nsis-setup.exe" -ArgumentList "/S" -Wait
          
      - name: Install InetC Plugin
        run: |
          Invoke-WebRequest -Uri "https://nsis.sourceforge.io/mediawiki/images/c/c9/Inetc.zip" -OutFile inetc.zip
          Expand-Archive -Path inetc.zip -DestinationPath inetc
          Copy-Item "inetc\Plugins\x86-ansi\InetC.dll" "C:\Program Files (x86)\NSIS\Plugins\" -Force

      - name: Update NSIS files
        run: |
          Expand-Archive -Path "Sandboxie\install\nsis_updates.zip" -DestinationPath nsis_updates
          Copy-Item "nsis_updates\nsis\Contrib\Modern UI\System.nsh" "C:\Program Files (x86)\NSIS\Contrib\Modern UI\" -Force
          Copy-Item "nsis_updates\nsis\Contrib\Modern UI\Language files\*" "C:\Program Files (x86)\NSIS\Contrib\Modern UI\Language files\" -Force

      - name: Setup Iconv
        run: |
          mkdir tools\iconv -Force
          Invoke-WebRequest -Uri "https://sourceforge.net/projects/gnuwin32/files/libiconv/1.9.2-1/libiconv-1.9.2-1-bin.zip/download" -OutFile iconv-bin.zip -UserAgent "Mozilla/5.0"
          Invoke-WebRequest -Uri "https://sourceforge.net/projects/gnuwin32/files/libiconv/1.9.2-1/libiconv-1.9.2-1-dep.zip/download" -OutFile iconv-dep.zip -UserAgent "Mozilla/5.0"
          Expand-Archive -Path iconv-bin.zip -DestinationPath iconv-bin
          Expand-Archive -Path iconv-dep.zip -DestinationPath iconv-dep
          Copy-Item "iconv-bin\bin\iconv.exe" "tools\iconv\" -Force
          Copy-Item "iconv-bin\bin\libiconv2.dll" "tools\iconv\" -Force
          Copy-Item "iconv-dep\bin\libintl3.dll" "tools\iconv\" -Force

      - name: Build NSIS Installer (x64)
        run: |
          $env:SBIE_BUILDARCH = "x64"
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DSBIE_BUILDARCH=x64 Sandboxie\install\SandboxieVS.nsi

      - name: Build NSIS Installer (Win32)
        run: |
          $env:SBIE_BUILDARCH = "Win32"
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DSBIE_BUILDARCH=Win32 Sandboxie\install\SandboxieVS.nsi

      - name: Upload Sandboxie Build
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Sandboxie-Build-x64
          path: |
            BuildOutput/**
          retention-days: 30

      - name: Upload NSIS Installers
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Sandboxie-Installers
          path: |
            Sandboxie\Bin\SandboxieInstall*.exe
          retention-days: 30
